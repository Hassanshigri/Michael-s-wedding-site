services:
  - type: web
    name: wedding-api
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wedding-db
          property: connectionString

databases:
  - name: wedding-db
    databaseName: wedding_db
    user: wedding_user
    region: oregon
